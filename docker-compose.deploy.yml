services:
  app:
    image: ${APP_IMAGE:-willimaps-app:latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-willimaps};Username=${POSTGRES_USER:-willimaps};Password=${POSTGRES_PASSWORD:-change_me}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-willimaps}
      POSTGRES_USER: ${POSTGRES_USER:-willimaps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-willimaps} -d ${POSTGRES_DB:-willimaps}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
