services:
  app:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: willimaps-app
    working_dir: /src/WilliMaps
    volumes:
      - ./WilliMaps:/src/WilliMaps
    command: >
      sh -c "dotnet restore WilliMaps.csproj &&
             dotnet run --project WilliMaps.csproj --urls http://0.0.0.0:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Seed__AdminPassword: ${ADMIN_PASSWORD}
    ports:
      - "5166:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:16-3.4
    container_name: willimaps-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
