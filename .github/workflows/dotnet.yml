# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    # 1. Restore der Abhängigkeiten (im WilliMaps-Verzeichnis)
    - name: Restore dependencies
      run: dotnet restore WilliMaps.sln
      working-directory: ./WilliMaps

    # 2. Build des Hauptprojekts (im WilliMaps-Verzeichnis)
    - name: Build WilliMaps
      run: dotnet build WilliMaps.sln --no-restore --configuration Release
      working-directory: ./WilliMaps

    # 3. Build des Testprojekts (im Root-Verzeichnis, da die .csproj-Datei dort liegt)
    - name: Build Willi-Maps-Test
      run: dotnet build ./Willi-Maps-Test/Willi-Maps-Test.csproj --no-restore --configuration Release

    # 4. Tests ausführen (im Root-Verzeichnis)
    - name: Run Tests
      run: dotnet test ./Willi-Maps-Test/Willi-Maps-Test.csproj --no-build --configuration Release --verbosity normal
