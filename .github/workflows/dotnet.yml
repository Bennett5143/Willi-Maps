# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

     # 1. Restore für das Hauptprojekt (WilliMaps)
    - name: Restore WilliMaps
      run: dotnet restore ./WilliMaps/WilliMaps.csproj

    # 2. Restore für das Testprojekt (Willi-Maps-Test)
    - name: Restore Willi-Maps-Test
      run: dotnet restore ./Willi-Maps-Test/Willi-Maps-Test.csproj

    # 3. Build des Hauptprojekts (WilliMaps)
    - name: Build WilliMaps
      run: dotnet build ./WilliMaps/WilliMaps.csproj --no-restore --configuration Release

    # 4. Build des Testprojekts (Willi-Maps-Test)
    - name: Build Willi-Maps-Test
      run: dotnet build ./Willi-Maps-Test/Willi-Maps-Test.csproj --no-restore --configuration Release

    # 5. Tests ausführen
    - name: Run Tests
      run: dotnet test ./Willi-Maps-Test/Willi-Maps-Test.csproj --no-build --configuration Release --verbosity normal
