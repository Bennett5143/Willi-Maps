# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Change to WilliMaps directory
      run: cd WilliMaps
      
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore

    #Build des Testprojekts (Willi-Maps-Test)
    - name: Build Willi-Maps-Test
      run: dotnet build ../Willi-Maps-Test/Willi-Maps-Test.csproj --no-restore --configuration Release

    # Tests ausführen
    - name: Run Tests
      run: dotnet test ../Willi-Maps-Test/Willi-Maps-Test.csproj --no-build --configuration Release --verbosity normal
